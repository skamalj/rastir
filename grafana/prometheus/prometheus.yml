global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rastir-sre-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          app: prometheus

  - job_name: rastir
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ['172.17.0.1:8080']
        labels:
          app: rastir
