server:
  host: "0.0.0.0"
  port: 8080

trace_store:
  enabled: true

redaction:
  enabled: true

evaluation:
  enabled: true
  queue_size: 10000
  worker_concurrency: 4
  default_sample_rate: 0.5
  judge_model: "gemini-2.5-pro"
  judge_provider: "gemini"

exporter:
  otlp_endpoint: "http://localhost:4318"
  batch_size: 200
  flush_interval: 5

logging:
  # Console output (stdout) is the default — ideal for Docker/Kubernetes.
  # Override with environment variables:
  #   RASTIR_SERVER_LOGGING_LEVEL       (DEBUG, INFO, WARNING, ERROR)
  #   RASTIR_SERVER_LOGGING_STRUCTURED  (true/false — JSON vs plain text)
  #   RASTIR_SERVER_LOGGING_LOG_FILE    (optional file path for debug log)
  level: "INFO"
  structured: true

exemplars:
  enabled: true
  trace_id_format: w3c  # w3c (Tempo, Cloud Trace) | xray (AWS X-Ray)

sre:
  enabled: true
  default_slo_error_rate: 0.01
  default_cost_budget_usd: 25.0
  agents:
    langgraph_e2e_agent:
      slo_error_rate: 0.02
    manual_graph_agent:
      slo_error_rate: 0.01
    openai_agent:
      slo_error_rate: 0.01
