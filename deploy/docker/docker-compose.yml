# ---------------------------------------------------------------------------
# Rastir Observability Stack — Local Docker Compose
# ---------------------------------------------------------------------------
# Brings up all 5 services:
#   1. rastir-server    — LLM & Agent observability server
#   2. otel-collector   — OpenTelemetry Collector (forwards traces to Tempo)
#   3. prometheus       — Metrics storage + SRE rules + alerts
#   4. grafana          — Dashboards (pre-provisioned)
#   5. tempo            — Trace storage backend
#
# Usage:
#   cd deploy/docker
#   docker compose up -d
#
# Ports:
#   8080  — Rastir Server  (health: GET /health, metrics: GET /metrics)
#   3000  — Grafana         (admin/admin)
#   9090  — Prometheus
#   3200  — Tempo
#   4317  — OTLP gRPC  (via OTel Collector)
#   4318  — OTLP HTTP  (via OTel Collector)
# ---------------------------------------------------------------------------

services:
  rastir-server:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: rastir-server
    ports:
      - "8080:8080"
    environment:
      - RASTIR_SERVER_HOST=0.0.0.0
      - RASTIR_SERVER_PORT=8080
      - RASTIR_SERVER_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - RASTIR_SERVER_EXEMPLARS_ENABLED=true
      - RASTIR_SERVER_LOGGING_STRUCTURED=true
    volumes:
      - ../../rastir-server-config.yaml:/app/rastir-server-config.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: rastir-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      tempo:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: rastir-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--enable-feature=exemplar-storage"
    depends_on:
      rastir-server:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: rastir-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: rastir-tempo
    ports:
      - "3200:3200"
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
