# ---------------------------------------------------------------------------
# OpenTelemetry Collector — Local / Open-Source Configuration
# ---------------------------------------------------------------------------
# Receives OTLP traces from Rastir Server and forwards them to Tempo.
# Prometheus scrapes Rastir directly — the collector is NOT in the metrics path.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

exporters:
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp/tempo]
