# Prometheus Recording Rules — Rastir SRE Metrics
#
# These rules replace the server-side SRE engine.  Prometheus evaluates
# them periodically and stores the results as new time-series that
# Grafana dashboards query directly.
#
# Raw counters consumed:
#   rastir_llm_calls_total   {service, env, agent, model, provider}
#   rastir_errors_total      {service, env, span_type, error_type, model, provider, agent}
#   rastir_cost_total        {service, env, agent, model, provider, pricing_profile}
#
# Config gauges consumed (set once by the server at startup):
#   rastir_slo_error_rate    {agent}
#   rastir_cost_budget_usd   {agent}
#
# NOTE: All source rules use label_replace to map empty agent/model
# labels to "unknown"/"unattributed" so every series has non-empty
# labels.  This ensures consistent totals across all dashboard panels.

groups:
  # ------------------------------------------------------------------
  # Weekly SRE metrics  (7-day rolling window)
  # ------------------------------------------------------------------
  - name: rastir_sre_weekly
    interval: 15s
    rules:
      # Expected volume — total LLM calls in the last 7 days
      # NOTE: NOT capped at month boundary — used for estimation/projection
      - record: rastir:expected_volume:week
        expr: >
          sum by(service, env, agent) (
            label_replace(
              increase(rastir_llm_calls_total[7d]),
              "agent", "unknown", "agent", "^$"
            )
          )

      # Actual volume — capped at month boundary
      # Uses scaling: increase(7d) * min(day_of_month/7, 1)
      - record: rastir:volume:week
        expr: >
          sum by(service, env, agent) (
            label_replace(
              increase(rastir_llm_calls_total[7d]),
              "agent", "unknown", "agent", "^$"
            )
          )
          * scalar(clamp_max(day_of_month(vector(time())) / 7, 1))

      # Error count — LLM errors in the last 7 days (capped at month boundary)
      - record: rastir:errors:week
        expr: >
          round(
            sum by(service, env, agent) (
              label_replace(
                increase(rastir_errors_total{span_type="llm"}[7d]),
                "agent", "unknown", "agent", "^$"
              )
            )
            * scalar(clamp_max(day_of_month(vector(time())) / 7, 1))
          )

      # Error count by model (for pie chart breakdowns)
      # Includes agent label so dashboard can filter by $agent
      # Empty model labels are replaced with "unattributed"
      # Empty agent labels are replaced with "unknown"
      # Capped at month boundary
      - record: rastir:errors_by_model:week
        expr: >
          round(
            sum by(service, env, agent, model) (
              label_replace(
                label_replace(
                  increase(rastir_errors_total{span_type="llm"}[7d]),
                  "agent", "unknown", "agent", "^$"
                ),
                "model", "unattributed", "model", "^$"
              )
            )
            * scalar(clamp_max(day_of_month(vector(time())) / 7, 1))
          )

      # Error budget total = expected_volume × SLO error rate
      # Agents with a configured gauge get their specific SLO;
      # unconfigured agents fall back to the default (agent="unknown") SLO.
      - record: rastir:error_budget_total:week
        expr: >
          rastir:expected_volume:week
          * on(agent) group_left
          rastir_slo_error_rate
          or
          rastir:expected_volume:week
          * scalar(rastir_slo_error_rate{agent="unknown"})

      # Error budget remaining = budget - errors
      # Pad both sides with 0 so label sets align:
      #   agents with budget but no errors → remaining = budget
      #   agents with errors but no budget → remaining = -errors
      - record: rastir:error_budget_remaining:week
        expr: >
          (rastir:error_budget_total:week or rastir:errors:week * 0)
          - (rastir:errors:week or rastir:error_budget_total:week * 0)

      # Error budget consumed %
      - record: rastir:error_budget_consumed_pct:week
        expr: >
          ((rastir:errors:week or rastir:error_budget_total:week * 0)
           / (rastir:error_budget_total:week or rastir:errors:week * 0)) * 100
          or
          (rastir:errors:week > bool 0) * 10000

      # SLA status: 1 = healthy, 0 = breached
      - record: rastir:sla_status:week
        expr: >
          (rastir:error_budget_remaining:week > bool 0)

      # Error days to exhaustion
      # daily_error_rate = errors / effective_days
      # days_to_exhaust = remaining / daily_rate
      - record: rastir:error_days_to_exhaustion:week
        expr: >
          clamp_max(
            rastir:error_budget_remaining:week
            / (rastir:errors:week / scalar(clamp_min(clamp_max(day_of_month(vector(time())), 7), 1)) > 0)
          , 9999)
          or
          rastir:error_budget_remaining:week * 0 + 9999

      # Cost consumed in 7 days (capped at month boundary)
      - record: rastir:cost:week
        expr: >
          sum by(service, env, agent) (
            label_replace(
              increase(rastir_cost_total[7d]),
              "agent", "unknown", "agent", "^$"
            )
          )
          * scalar(clamp_max(day_of_month(vector(time())) / 7, 1))

      # Cost budget total — fixed global value from config gauge
      - record: rastir:cost_budget_total:week
        expr: scalar(rastir_cost_budget_usd{agent="unknown"})

      # Cost budget remaining = budget - total_cost_consumed
      - record: rastir:cost_budget_remaining:week
        expr: >
          scalar(rastir_cost_budget_usd{agent="unknown"})
          - sum(rastir:cost:week)

      # Cost budget consumed %
      - record: rastir:cost_budget_consumed_pct:week
        expr: >
          (sum(rastir:cost:week)
           / scalar(rastir_cost_budget_usd{agent="unknown"})) * 100

      # Cost burn rate ($/day) — divide by effective days in period
      - record: rastir:cost_burn_rate_daily:week
        expr: sum(rastir:cost:week) / scalar(clamp_min(clamp_max(day_of_month(vector(time())), 7), 1))

      # Cost days to exhaustion
      - record: rastir:cost_days_to_exhaustion:week
        expr: >
          clamp_max(
            (scalar(rastir_cost_budget_usd{agent="unknown"}) - sum(rastir:cost:week))
            / (sum(rastir:cost:week) / scalar(clamp_min(clamp_max(day_of_month(vector(time())), 7), 1)) > 0)
          , 9999)
          or vector(9999)

      # Token usage — cumulative input tokens (capped at month boundary)
      - record: rastir:tokens_input:week
        expr: >
          sum by(service, env) (
            increase(rastir_tokens_input_total[7d])
          )
          * scalar(clamp_max(day_of_month(vector(time())) / 7, 1))

      # Token usage — cumulative output tokens (capped at month boundary)
      - record: rastir:tokens_output:week
        expr: >
          sum by(service, env) (
            increase(rastir_tokens_output_total[7d])
          )
          * scalar(clamp_max(day_of_month(vector(time())) / 7, 1))

  # ------------------------------------------------------------------
  # Monthly SRE metrics (30-day rolling window)
  # ------------------------------------------------------------------
  - name: rastir_sre_monthly
    interval: 15s
    rules:
      # Expected volume — NOT capped at month boundary (used for estimation)
      - record: rastir:expected_volume:month
        expr: >
          sum by(service, env, agent) (
            label_replace(
              increase(rastir_llm_calls_total[30d]),
              "agent", "unknown", "agent", "^$"
            )
          )

      # Actual volume — capped at month boundary
      - record: rastir:volume:month
        expr: >
          sum by(service, env, agent) (
            label_replace(
              increase(rastir_llm_calls_total[30d]),
              "agent", "unknown", "agent", "^$"
            )
          )
          * scalar(day_of_month(vector(time())) / 30)

      # Errors capped at month boundary
      - record: rastir:errors:month
        expr: >
          round(
            sum by(service, env, agent) (
              label_replace(
                increase(rastir_errors_total{span_type="llm"}[30d]),
                "agent", "unknown", "agent", "^$"
              )
            )
            * scalar(day_of_month(vector(time())) / 30)
          )

      # Errors by model — capped at month boundary
      - record: rastir:errors_by_model:month
        expr: >
          round(
            sum by(service, env, agent, model) (
              label_replace(
                label_replace(
                  increase(rastir_errors_total{span_type="llm"}[30d]),
                  "agent", "unknown", "agent", "^$"
                ),
                "model", "unattributed", "model", "^$"
              )
            )
            * scalar(day_of_month(vector(time())) / 30)
          )

      - record: rastir:error_budget_total:month
        expr: >
          rastir:expected_volume:month
          * on(agent) group_left
          rastir_slo_error_rate
          or
          rastir:expected_volume:month
          * scalar(rastir_slo_error_rate{agent="unknown"})

      - record: rastir:error_budget_remaining:month
        expr: >
          (rastir:error_budget_total:month or rastir:errors:month * 0)
          - (rastir:errors:month or rastir:error_budget_total:month * 0)

      - record: rastir:error_budget_consumed_pct:month
        expr: >
          ((rastir:errors:month or rastir:error_budget_total:month * 0)
           / (rastir:error_budget_total:month or rastir:errors:month * 0)) * 100
          or
          (rastir:errors:month > bool 0) * 10000

      - record: rastir:sla_status:month
        expr: >
          (rastir:error_budget_remaining:month > bool 0)

      - record: rastir:error_days_to_exhaustion:month
        expr: >
          clamp_max(
            rastir:error_budget_remaining:month
            / (rastir:errors:month / scalar(clamp_min(day_of_month(vector(time())), 1)) > 0)
          , 9999)
          or
          rastir:error_budget_remaining:month * 0 + 9999

      # Cost — capped at month boundary
      - record: rastir:cost:month
        expr: >
          sum by(service, env, agent) (
            label_replace(
              increase(rastir_cost_total[30d]),
              "agent", "unknown", "agent", "^$"
            )
          )
          * scalar(day_of_month(vector(time())) / 30)

      - record: rastir:cost_budget_total:month
        expr: scalar(rastir_cost_budget_usd{agent="unknown"})

      - record: rastir:cost_budget_remaining:month
        expr: >
          scalar(rastir_cost_budget_usd{agent="unknown"})
          - sum(rastir:cost:month)

      - record: rastir:cost_budget_consumed_pct:month
        expr: >
          (sum(rastir:cost:month)
           / scalar(rastir_cost_budget_usd{agent="unknown"})) * 100

      - record: rastir:cost_burn_rate_daily:month
        expr: sum(rastir:cost:month) / scalar(clamp_min(day_of_month(vector(time())), 1))

      - record: rastir:cost_days_to_exhaustion:month
        expr: >
          clamp_max(
            (scalar(rastir_cost_budget_usd{agent="unknown"}) - sum(rastir:cost:month))
            / (sum(rastir:cost:month) / scalar(clamp_min(day_of_month(vector(time())), 1)) > 0)
          , 9999)
          or vector(9999)

      # Token usage — cumulative input tokens (capped at month boundary)
      - record: rastir:tokens_input:month
        expr: >
          sum by(service, env) (
            increase(rastir_tokens_input_total[30d])
          )
          * scalar(day_of_month(vector(time())) / 30)

      # Token usage — cumulative output tokens (capped at month boundary)
      - record: rastir:tokens_output:month
        expr: >
          sum by(service, env) (
            increase(rastir_tokens_output_total[30d])
          )
          * scalar(day_of_month(vector(time())) / 30)

  # ------------------------------------------------------------------
  # Burn Rates (short & long windows, no period dimension)
  # ------------------------------------------------------------------
  - name: rastir_sre_burn_rates
    interval: 15s
    rules:
      # Short burn rate (1h) = (error_rate_1h / SLO)
      - record: rastir:error_burn_rate:1h
        expr: >
          (
            sum by(service, env, agent) (label_replace(increase(rastir_errors_total{span_type="llm"}[1h]), "agent", "unknown", "agent", "^$"))
            / sum by(service, env, agent) (label_replace(increase(rastir_llm_calls_total[1h]), "agent", "unknown", "agent", "^$"))
          )
          / on(agent) group_left rastir_slo_error_rate
          or
          (
            sum by(service, env, agent) (label_replace(increase(rastir_errors_total{span_type="llm"}[1h]), "agent", "unknown", "agent", "^$"))
            / sum by(service, env, agent) (label_replace(increase(rastir_llm_calls_total[1h]), "agent", "unknown", "agent", "^$"))
          )
          / scalar(rastir_slo_error_rate{agent="unknown"})
          or
          sum by(service, env, agent) (label_replace(increase(rastir_llm_calls_total[1h]), "agent", "unknown", "agent", "^$")) * 0

      # Long burn rate (6h) = (error_rate_6h / SLO)
      - record: rastir:error_burn_rate:6h
        expr: >
          (
            sum by(service, env, agent) (label_replace(increase(rastir_errors_total{span_type="llm"}[6h]), "agent", "unknown", "agent", "^$"))
            / sum by(service, env, agent) (label_replace(increase(rastir_llm_calls_total[6h]), "agent", "unknown", "agent", "^$"))
          )
          / on(agent) group_left rastir_slo_error_rate
          or
          (
            sum by(service, env, agent) (label_replace(increase(rastir_errors_total{span_type="llm"}[6h]), "agent", "unknown", "agent", "^$"))
            / sum by(service, env, agent) (label_replace(increase(rastir_llm_calls_total[6h]), "agent", "unknown", "agent", "^$"))
          )
          / scalar(rastir_slo_error_rate{agent="unknown"})
          or
          sum by(service, env, agent) (label_replace(increase(rastir_llm_calls_total[6h]), "agent", "unknown", "agent", "^$")) * 0
