# Prometheus config for Rastir observability stack
# Deployed as part of the Prometheus container image
global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: "rastir-server"
    metrics_path: /metrics
    static_configs:
      - targets: ["rastir-server:8080"]
        labels:
          service: rastir
