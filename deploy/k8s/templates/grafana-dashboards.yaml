{{/*
  Grafana Dashboard ConfigMap
  ---
  Dashboard JSON files are too large to inline in templates.
  Use the provided script to generate this ConfigMap from the
  dashboard files:

    ./generate-dashboard-configmap.sh > templates/grafana-dashboards-data.yaml

  Or apply them directly:

    kubectl create configmap grafana-dashboards \
      --namespace=rastir \
      --from-file=../../grafana/dashboards/
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.namespace }}
  labels:
    app: grafana
    {{- include "rastir.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
data: {}
