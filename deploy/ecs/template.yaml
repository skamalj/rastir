AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Rastir - Private ECS Fargate deployment with ADOT sidecar for
  Prometheus remote-write to Amazon Managed Prometheus.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into.

  VpcCidr:
    Type: String
    Default: "172.31.0.0/16"
    Description: VPC CIDR block for security group ingress.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs (comma-separated).

  AssignPublicIp:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: >
      Set to ENABLED when using public subnets without a NAT gateway.

  RastirImage:
    Type: String
    Default: ghcr.io/skamalj/rastir-server:latest

  FargateCpu:
    Type: String
    Default: "512"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]

  FargateMemory:
    Type: String
    Default: "1024"
    AllowedValues: ["512", "1024", "2048", "4096", "8192"]

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0

  AmpRemoteWriteEndpoint:
    Type: String
    Description: Amazon Managed Prometheus remote-write endpoint URL.

  AmpRegion:
    Type: String
    Default: us-east-1

  RastirServerPort:
    Type: Number
    Default: 8080

Resources:
  RastirLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}/rastir"
      RetentionInDays: 30

  AdotLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}/adot"
      RetentionInDays: 14

  RastirSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Rastir server - allow inbound from VPC only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref RastirServerPort
          ToPort: !Ref RastirServerPort
          CidrIp: !Ref VpcCidr
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AmpRemoteWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - aps:RemoteWrite
                Resource: "*"
        - PolicyName: SsmExec
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"
        - PolicyName: XRayWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: "*"

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref AWS::StackName
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      ServiceConnectDefaults:
        Namespace: !GetAtt ServiceDiscoveryNamespace.Arn

  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::HttpNamespace
    Properties:
      Name: !Sub "${AWS::StackName}"
      Description: Service Connect namespace for Rastir

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-task"
      Cpu: !Ref FargateCpu
      Memory: !Ref FargateMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: rastir-server
          Image: !Ref RastirImage
          Essential: true
          PortMappings:
            - ContainerPort: !Ref RastirServerPort
              Protocol: tcp
              Name: rastir-http
          Environment:
            - Name: RASTIR_SERVER_HOST
              Value: "0.0.0.0"
            - Name: RASTIR_SERVER_PORT
              Value: !Sub "${RastirServerPort}"
            - Name: RASTIR_SERVER_LOGGING_STRUCTURED
              Value: "true"
            - Name: RASTIR_SERVER_CONFIG
              Value: "/app/rastir-server-config.yaml"
            - Name: RASTIR_SERVER_EXPORTER_OTLP_ENDPOINT
              Value: "http://localhost:4318"
            - Name: RASTIR_SERVER_EXEMPLARS_ENABLED
              Value: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref RastirLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: rastir
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub "python -c \"import httpx; httpx.get('http://localhost:${RastirServerPort}/health').raise_for_status()\""
            Interval: 15
            Timeout: 5
            Retries: 3
            StartPeriod: 10

        - Name: adot-collector
          Image: public.ecr.aws/aws-observability/aws-otel-collector:latest
          Essential: false
          Environment:
            - Name: AOT_CONFIG_CONTENT
              Value: !Sub |
                receivers:
                  prometheus:
                    config:
                      scrape_configs:
                        - job_name: "rastir-server"
                          scrape_interval: 15s
                          static_configs:
                            - targets: ["localhost:${RastirServerPort}"]
                          metrics_path: /metrics
                  otlp:
                    protocols:
                      grpc:
                        endpoint: "0.0.0.0:4317"
                      http:
                        endpoint: "0.0.0.0:4318"
                exporters:
                  prometheusremotewrite:
                    endpoint: "${AmpRemoteWriteEndpoint}"
                    auth:
                      authenticator: sigv4auth
                  awsxray:
                    region: "${AWS::Region}"
                extensions:
                  sigv4auth:
                    region: "${AmpRegion}"
                    service: "aps"
                  health_check:
                    endpoint: "0.0.0.0:13133"
                service:
                  extensions: [sigv4auth, health_check]
                  pipelines:
                    metrics:
                      receivers: [prometheus]
                      exporters: [prometheusremotewrite]
                    traces:
                      receivers: [otlp]
                      exporters: [awsxray]
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AdotLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: adot
          HealthCheck:
            Command:
              - CMD-SHELL
              - "wget -qO- http://localhost:13133/ || exit 1"
            Interval: 15
            Timeout: 5
            Retries: 3
            StartPeriod: 10

  Service:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      ServiceName: rastir-server
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      EnableExecuteCommand: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !GetAtt RastirSG.GroupId
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt ServiceDiscoveryNamespace.Arn
        Services:
          - PortName: rastir-http
            ClientAliases:
              - Port: !Ref RastirServerPort
                DnsName: rastir-server
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100

Outputs:
  ClusterName:
    Value: !Ref Cluster

  ServiceName:
    Value: !GetAtt Service.Name

  ServiceConnectEndpoint:
    Value: !Sub "http://rastir-server:${RastirServerPort}"
    Description: Internal endpoint for services in the same namespace.

  PortForwardCommand:
    Description: Run this to port-forward from your laptop.
    Value: !Sub "./port-forward.sh ${Cluster} ${RastirServerPort}"
