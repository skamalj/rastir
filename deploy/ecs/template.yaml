AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Rastir — Private ECS Fargate deployment with ADOT sidecar for
  Prometheus remote-write to Amazon Managed Prometheus.

# ---------------------------------------------------------------------------
Parameters:
# ---------------------------------------------------------------------------
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs (comma-separated).

  RastirImage:
    Type: String
    Default: ghcr.io/skamalj/rastir-server:latest
    Description: Rastir server container image URI.

  FargateCpu:
    Type: String
    Default: "512"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]

  FargateMemory:
    Type: String
    Default: "1024"
    AllowedValues: ["512", "1024", "2048", "4096", "8192"]

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0

  AmpRemoteWriteEndpoint:
    Type: String
    Description: Amazon Managed Prometheus remote-write endpoint URL.

  AmpRegion:
    Type: String
    Default: us-east-1
    Description: AWS region for AMP SigV4 signing.

  RastirServerPort:
    Type: Number
    Default: 8080

  RastirEnvJson:
    Type: String
    Default: "[]"
    Description: >
      JSON array of {name,value} objects for Rastir container environment
      variables. Generated by deploy.sh.

  RastirSecretsJson:
    Type: String
    Default: "[]"
    Description: >
      JSON array of {name,valueFrom} objects for Rastir container secrets.
      Generated by deploy.sh.

# ---------------------------------------------------------------------------
Resources:
# ---------------------------------------------------------------------------

  # ── Logging ──────────────────────────────────────────────────────────────
  RastirLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}/rastir"
      RetentionInDays: 30

  AdotLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}/adot"
      RetentionInDays: 14

  # ── Security Group ──────────────────────────────────────────────────────
  RastirSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Rastir server — allow inbound from VPC only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref RastirServerPort
          ToPort: !Ref RastirServerPort
          CidrIp:
            Fn::Select:
              - 0
              - Fn::GetAtt: [VpcCidrLookup, CidrBlocks]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # Custom resource to look up VPC CIDR
  VpcCidrLookupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DescribeVpc
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ec2:DescribeVpcs
                Resource: "*"

  VpcCidrLookupFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt VpcCidrLookupRole.Arn
      Code:
        ZipFile: |
          import boto3, cfnresponse
          def handler(event, context):
              if event["RequestType"] == "Delete":
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return
              vpc_id = event["ResourceProperties"]["VpcId"]
              ec2 = boto3.client("ec2")
              resp = ec2.describe_vpcs(VpcIds=[vpc_id])
              cidr = resp["Vpcs"][0]["CidrBlock"]
              cfnresponse.send(event, context, cfnresponse.SUCCESS,
                               {"CidrBlocks": [cidr]})

  VpcCidrLookup:
    Type: Custom::VpcCidr
    Properties:
      ServiceToken: !GetAtt VpcCidrLookupFn.Arn
      VpcId: !Ref VpcId

  # ── IAM ─────────────────────────────────────────────────────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - ssm:GetParameters
                Resource: "*"

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AmpRemoteWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - aps:RemoteWrite
                Resource: "*"
        - PolicyName: SsmExec
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"

  # ── ECS Cluster ─────────────────────────────────────────────────────────
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref AWS::StackName
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      ServiceConnectDefaults:
        Namespace: !GetAtt ServiceDiscoveryNamespace.Arn

  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::HttpNamespace
    Properties:
      Name: !Sub "${AWS::StackName}"
      Description: Service Connect namespace for Rastir

  # ── Task Definition ────────────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-task"
      Cpu: !Ref FargateCpu
      Memory: !Ref FargateMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        # ── Rastir Server ──
        - Name: rastir-server
          Image: !Ref RastirImage
          Essential: true
          PortMappings:
            - ContainerPort: !Ref RastirServerPort
              Protocol: tcp
              Name: rastir-http
          Environment: !Ref RastirEnvJson
          Secrets: !Ref RastirSecretsJson
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref RastirLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: rastir
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub "python -c \"import httpx; httpx.get('http://localhost:${RastirServerPort}/health').raise_for_status()\""
            Interval: 15
            Timeout: 5
            Retries: 3
            StartPeriod: 10

        # ── ADOT Collector (sidecar) ──
        - Name: adot-collector
          Image: public.ecr.aws/aws-observability/aws-otel-collector:latest
          Essential: false
          Command: ["--config", "/etc/ecs/otel-config.yaml"]
          Environment:
            - Name: AMP_REMOTE_WRITE_ENDPOINT
              Value: !Ref AmpRemoteWriteEndpoint
            - Name: AMP_REGION
              Value: !Ref AmpRegion
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AdotLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: adot
          HealthCheck:
            Command:
              - CMD-SHELL
              - "wget -qO- http://localhost:13133/ || exit 1"
            Interval: 15
            Timeout: 5
            Retries: 3
            StartPeriod: 10

  # ── ECS Service ────────────────────────────────────────────────────────
  Service:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      ServiceName: rastir-server
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      EnableExecuteCommand: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !GetAtt RastirSG.GroupId
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: !GetAtt ServiceDiscoveryNamespace.Arn
        Services:
          - PortName: rastir-http
            ClientAliases:
              - Port: !Ref RastirServerPort
                DnsName: rastir-server
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100

# ---------------------------------------------------------------------------
Outputs:
# ---------------------------------------------------------------------------
  ClusterName:
    Value: !Ref Cluster

  ServiceName:
    Value: !GetAtt Service.Name

  ServiceConnectEndpoint:
    Value: !Sub "http://rastir-server:${RastirServerPort}"
    Description: >
      Internal endpoint reachable from other services in the same
      Service Connect namespace.

  PortForwardCommand:
    Description: Run this to port-forward from your laptop.
    Value: !Sub |
      ./port-forward.sh ${Cluster} ${RastirServerPort}
